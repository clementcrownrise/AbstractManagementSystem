{% load static %}
<!DOCTYPE html>
<html lang="en"> 
<head>
    <title>Abstract Management System - WACS</title>
    
    <!-- Meta -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Portal - Abstract Management System">
    <meta name="author" content="">    
    <link rel="shortcut icon" href=""> 
    
    <!-- FontAwesome JS-->
    <script defer src="{% static 'plugins/fontawesome/js/all.min.js' %}"></script>
    
    <!-- App CSS -->  
    <link id="theme-style" rel="stylesheet" href="{% static 'css/portal.css' %}">

</head> 

<body class="app app-signup p-0">    	
    <div class="row g-0 app-auth-wrapper">
	    <div class="col-12 col-md-7 col-lg-6 auth-main-col text-center p-5">
		    <div class="d-flex flex-column align-content-end">
			    <div class="app-auth-body mx-auto">	
				    <div class="app-auth-branding mb-4"><a href="{% url 'login' %}">
                        <img class="logo-icon me-2" width="300"
                         src="{% static 'images/wacslogo.png' %}" alt="logo"></a></div>
					<h2 class="auth-heading text-center mb-4">Register as a Reviewer </h2>					
	
					<div class="auth-form-container text-start mx-auto">
						<form  action="{% url 'register-reviewer' %}" class="auth-form auth-signup-form" method="POST">
                            {% include 'includes/alerts.html' %}
                            {% csrf_token %}         
							<div class="email mb-3">
								<label class="sr-only" for="signup-email">First Name</label>
								<input id="signup-name" name="first_name" type="text" class="form-control
                                 signup-name" placeholder="Full name" required="required">
							</div>
                            <div class="email mb-3">
								<label class="sr-only" for="signup-email">Last Name</label>
								<input id="signup-name" name="last_name" type="text" 
                                class="form-control signup-name" placeholder="Last name" required="required">
							</div>
							<div class="email mb-3">
								<label class="sr-only" for="signup-email">Your Email</label>
								<input id="signup-email" name="email" 
                                type="email" class="form-control signup-email" 
                                placeholder="Email" required="required">
							</div>
                            <div class="email mb-3">
								<label class="sr-only" for="signup-email">Phone Number</label>
								<input id="signup-email" name="phone_number" 
                                class="form-control signup-email" 
                                placeholder="Phone Number" required="required">
							</div>
                              <div class="email mb-3">
								<label class="sr-only" for="signup-email">Faculty</label>
                               <select name="faculty" class="form-control" required="required">
                                <option>Select Faculty</option>
                                {% for faculty in faculties %}
                                    <option value="{{ faculty.id }}">
                                        {{ faculty.faculty_name }}
                                    </option>
                                {% endfor %}
                            </select>
								
							</div>
							<div class="password mb-3">
								<label class="sr-only" for="signup-password">Password</label>
								<input id="signup-password" name="password" type="password" class="form-control signup-password" placeholder="Create a password" required="required">
							</div>
                            <div class="password mb-3">
								<label class="sr-only" for="signup-password">Confirm Password</label>
								<input id="signup-password" name="confirm_password" type="password" 
                                class="form-control signup-password" placeholder="Confirm password" required="required">
							</div>
						
							
							<div class="text-center">
								<button type="submit" class="btn app-btn-primary w-100 theme-btn mx-auto">Register</button>
							</div>
						</form><!--//auth-form-->
						
						<div class="auth-option text-center pt-5">Already have an account? <a class="text-link" href="{% url 'login' %}" >Log in</a></div>
					</div><!--//auth-form-container-->	
					
					
				    
			    </div><!--//auth-body-->
		    
			    <footer class="app-auth-footer">
				    <div class="container text-center py-3">
				         <!--/* This template is free as long as you keep the footer attribution link. If you'd like to use the template without the attribution link, you can buy the commercial license via our website: themes.3rdwavemedia.com Thank you for your support. :) */-->
			        <small class="copyright">Developed By Double Edge Technologies </small>
				       
				    </div>
			    </footer><!--//app-auth-footer-->	
		    </div><!--//flex-column-->   
	    </div><!--//auth-main-col-->
	    <div class="col-12 col-md-5 col-lg-6 h-100 auth-background-col">
		    <div class="auth-background-holder">			    
		    </div>
		    <div class="auth-background-mask"></div>
		    <div class="auth-background-overlay p-3 p-lg-5">
			    <div class="d-flex flex-column align-content-end h-100">
				    <div class="h-100"></div>
				    <div class="overlay-content p-3 p-lg-4 rounded">
					    <h5 class="mb-3 overlay-title">Article/Dissertation Management System</h5>
					    <div>WEST AFRICAN COLLEGE OF SURGEONS</div>
				    </div>
				</div>
		    </div><!--//auth-background-overlay-->
	    </div><!--//auth-background-col-->
    
    </div><!--//row-->


</body>
</html>
